name = "yrdsl-viewer"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = false

# Bound to the apex yrdsl.app zone. The Worker decides per-request:
# - viewer pattern (/:user/:slug) → fetch from api.yrdsl.app, render HTML
#   with OG meta tags + reverse-proxy assets from app.yrdsl.app
# - everything else (/, /privacy, /terms, /assets/...) → pass through to
#   the GH Pages origin via `fetch(request)`
routes = [
  { pattern = "yrdsl.app/*", zone_name = "yrdsl.app" }
]

[vars]
# Source for OG meta tags and SPA shell.
API_URL = "https://api.yrdsl.app"
SPA_URL = "https://app.yrdsl.app"
