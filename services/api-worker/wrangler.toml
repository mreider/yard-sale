name = "yrdsl-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# Custom domain bound to the api.yrdsl.app subdomain in zone yrdsl.app.
# The DNS record is already in place (proxied A; any target works, the route
# takes precedence).
routes = [
  { pattern = "api.yrdsl.app/*", zone_name = "yrdsl.app" }
]

[vars]
# Where the SPA lives. Used as the prefix for email confirmation / password
# reset links, and as a redirect target for auth flows.
APP_URL = "https://app.yrdsl.app"
# Where /image/<key> is served. /image/* is mounted on THIS worker, not
# on APP_URL (the Pages SPA would intercept it with its SPA catchall).
# Leave on api.yrdsl.app so the URLs stored in items.images resolve to
# real bytes.
IMAGE_BASE_URL = "https://api.yrdsl.app"
# Where published sales are viewed. The viewer-worker runs on the apex
# and routes /{user}/{slug} → rendered viewer. Used to construct the
# publicUrl returned to clients.
VIEWER_URL = "https://yrdsl.app"
# Beta: use Resend's testing sender (no domain verification needed).
# Flip to "yrdsl.app <noreply@send.yrdsl.app>" once the send.yrdsl.app
# subdomain is verified on Resend.
EMAIL_FROM = "yrdsl.app <onboarding@resend.dev>"
# Prod origins only. .dev.vars overrides this for `wrangler dev` to include
# localhost:5173 / 4173 so the Vite proxy works locally.
ALLOWED_ORIGINS = "https://yrdsl.app,https://app.yrdsl.app"
# Invite-only beta gating. Flip to "false" to open public signup.
REQUIRE_INVITE = "true"
# First user matching this email (case-insensitive) gets is_admin=1 and
# bypasses the invite requirement. the way to bootstrap the first admin.
# Harmless to leave set after the initial signup.
BOOTSTRAP_ADMIN_EMAIL = "mreider@gmail.com"
# Widens the __ys_csrf cookie to the apex so the SPA on app.yrdsl.app
# can read it via document.cookie and echo it as X-CSRF-Token. Unset in
# local dev so localhost cookies work without fuss.
COOKIE_DOMAIN = "yrdsl.app"

[[d1_databases]]
binding = "DB"
database_name = "yard-sale"
database_id = "a9ff9f3f-dbf4-4088-b0d2-3644b261c7d1"
migrations_dir = "../../migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "b7d180afff244c3e8f1a65da58922d9b"

[[r2_buckets]]
binding = "R2_IMAGES"
bucket_name = "yard-sale-images"

[[r2_buckets]]
binding = "R2_AVATARS"
bucket_name = "yard-sale-avatars"

# Secrets (set via `wrangler secret put`, not here):
#   RESEND_API_KEY          . Resend API key (re_...); required for prod
#                              auth emails. Leave unset in local dev and the
#                              stub mailer logs + returns the confirmation URL
#                              in responses.
#   SESSION_SIGNING_KEY     . 32-byte random; signs session cookies.
