name: Deploy landing to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-landing
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Write CNAME
        run: echo "yrdsl.app" > apps/landing/CNAME
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/landing
          publish_branch: gh-pages
          cname: yrdsl.app
          commit_message: "Deploy landing: ${{ github.event.head_commit.message }}"
