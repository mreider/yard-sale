name: Smoke prod

on:
  workflow_run:
    workflows: ['Deploy Cloudflare Workers']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: smoke-prod
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    # Only run after a successful deploy, or when manually dispatched.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Wait 30s for deploy propagation
        run: sleep 30

      - name: Run smoke
        id: smoke
        env:
          API_URL: https://api.yrdsl.app
          PUBLIC_URL: https://app.yrdsl.app
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          RUN_ID: ${{ github.run_id }}
        run: node scripts/smoke.mjs

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'smoke-fail',
            });
            if (existing.data.length > 0) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Prod smoke test failed',
              labels: ['smoke-fail'],
              body: [
                'Prod smoke failed after a deploy.',
                '',
                `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Check the step output for the step that died. The widened `internal_error` response in api-worker includes `reqId` + `message` so you can grep Cloudflare Workers Logs for the same reqId.',
              ].join('\n'),
            });
