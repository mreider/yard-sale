name: Smoke self-hosted

on:
  schedule:
    # Daily at 06:30 UTC (off-peak, well-clear of hourly reaper).
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: smoke-selfhosted
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run self-hosted template smoke
        env:
          RUN_ID: ${{ github.run_id }}
        run: node scripts/smoke-selfhosted.mjs

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'smoke-selfhosted-fail',
            });
            if (existing.data.length > 0) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Self-hosted template smoke failed',
              labels: ['smoke-selfhosted-fail'],
              body: [
                'KuvopLLC/yrdsl-self-hosted failed to build cleanly.',
                '',
                `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Likely causes: vendor-refresh pushed a @yrdsl/core schema change that broke the template, or a dep update broke vite/tsc.',
              ].join('\n'),
            });
