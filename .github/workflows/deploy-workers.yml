name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'packages/core/**'
      - 'migrations/**'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-workers
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations (remote)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: services/api-worker
        run: pnpm exec wrangler d1 migrations apply yard-sale --remote

      - name: Push api-worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SESSION_SIGNING_KEY: ${{ secrets.SESSION_SIGNING_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        working-directory: services/api-worker
        run: |
          if [ -n "$SESSION_SIGNING_KEY" ]; then
            echo "$SESSION_SIGNING_KEY" | pnpm exec wrangler secret put SESSION_SIGNING_KEY
          fi
          if [ -n "$RESEND_API_KEY" ]; then
            echo "$RESEND_API_KEY" | pnpm exec wrangler secret put RESEND_API_KEY
          fi
          if [ -n "$TURNSTILE_SECRET_KEY" ]; then
            echo "$TURNSTILE_SECRET_KEY" | pnpm exec wrangler secret put TURNSTILE_SECRET_KEY
          fi

      - name: Deploy api-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: services/api-worker
        run: pnpm exec wrangler deploy

      - name: Deploy cleanup-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: services/cleanup-worker
        run: pnpm exec wrangler deploy

      - name: Deploy viewer-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: services/viewer-worker
        run: pnpm exec wrangler deploy
