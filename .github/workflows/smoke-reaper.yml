name: Smoke reaper

on:
  schedule:
    # Every hour at :15.
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-reaper
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  reap:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reap orphan smoke sales
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: services/api-worker
        run: |
          # Cascade from sales deletes items + sale_slug_redirects. R2 images
          # get swept by cleanup-worker's orphan sweep.
          pnpm exec wrangler d1 execute yard-sale --remote --command \
            "DELETE FROM sales WHERE title LIKE 'smoke\_%' ESCAPE '\\' AND created_at < (strftime('%s','now') - 3600);"

      - name: Reap orphan smoke tokens
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: services/api-worker
        run: |
          pnpm exec wrangler d1 execute yard-sale --remote --command \
            "DELETE FROM api_tokens WHERE name LIKE 'smoke\_%' ESCAPE '\\' AND created_at < (strftime('%s','now') - 3600);"
