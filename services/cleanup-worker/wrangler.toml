name = "yrdsl-cleanup"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = false

# Nightly at 03:17 UTC. off-hours, a couple minutes offset from every
# other cron in the world to avoid the top-of-hour surge.
[triggers]
crons = ["17 3 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "yard-sale"
database_id = "a9ff9f3f-dbf4-4088-b0d2-3644b261c7d1"
migrations_dir = "../../migrations"
